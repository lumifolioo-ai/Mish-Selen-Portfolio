<!DOCTYPE html>  <html lang="en">  <head>  <meta charset="UTF-8">    <meta name="viewport" content="width=device-width, initial-scale=1.0">  <title>Mish Selen | AI-Powered Web & UI/UX Designer</title>  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">  <style>  *{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Plus Jakarta Sans',sans-serif;
}

html,body{
width:100%;
height:100%;
}

body{
background:#080808;
color:white;
overflow:hidden;
}

/* MOVING LIGHT BACKGROUND */

body::before{

content:"";

position:absolute;

width:600px;
height:600px;

background:radial-gradient(circle,#444,transparent 70%);

top:-200px;
left:-200px;

filter:blur(100px);

animation:lightMove 10s infinite alternate;

}

@keyframes lightMove{

from{
transform:translate(0,0);
}

to{
transform:translate(350px,250px);
}

}

/* HERO */

.hero{

height:100vh;

display:flex;

align-items:center;

justify-content:flex-start;

padding:0 10%;

position:relative;

overflow:hidden;

}

/* GLASS FLOATING SHAPES */

.shape{

position:absolute;

background:rgba(255,255,255,.03);

border:1px solid rgba(255,255,255,.15);

backdrop-filter:blur(20px);

}

.shape1{

width:260px;
height:260px;

border-radius:50%;

right:12%;
top:18%;

animation:float 7s infinite;

}

.shape2{

width:130px;
height:130px;

border-radius:35px;

left:12%;
bottom:18%;

animation:float 8s infinite reverse;

}

@keyframes float{

50%{

transform:translateY(-40px) rotate(20deg);

}

}

/* CONTENT */

.content{

z-index:5;

max-width:1000px;

}

/* NAME */

h1{

font-size:clamp(5rem,12vw,10rem);

font-weight:800;

letter-spacing:-7px;

line-height:.9;

}

/* NAME CLICK LINK */

.name-link{

text-decoration:none;

color:white;

}

h1 span{

display:inline-block;

opacity:0;

animation:nameReveal 1s forwards;

}

@keyframes nameReveal{

from{

opacity:0;

transform:translateY(100px);

filter:blur(15px);

}

to{

opacity:1;

transform:translateY(0);

filter:blur(0);

}

}

h1 span:nth-child(1){animation-delay:.1s}
h1 span:nth-child(2){animation-delay:.2s}
h1 span:nth-child(3){animation-delay:.3s}
h1 span:nth-child(4){animation-delay:.4s}
h1 span:nth-child(5){animation-delay:.6s}
h1 span:nth-child(6){animation-delay:.7s}
h1 span:nth-child(7){animation-delay:.8s}
h1 span:nth-child(8){animation-delay:.9s}
h1 span:nth-child(9){animation-delay:1s}

/* SUBTITLE */

.subtitle{

margin-top:35px;

font-size:clamp(1.5rem,3vw,3rem);

color:#999;

opacity:0;

animation:subtitleShow 1.5s forwards;

animation-delay:1.5s;

}

@keyframes subtitleShow{

from{

opacity:0;

transform:translateY(50px);

}

to{

opacity:1;

transform:translateY(0);

}

}
/* PARTICLES */

.dot{

position:absolute;

width:5px;

height:5px;

background:white;

border-radius:50%;

opacity:.5;

animation:particleMove 8s infinite;

}

.d1{

left:20%;

top:30%;

}

.d2{

right:25%;

top:60%;

animation-delay:2s;

}

.d3{

left:70%;

bottom:25%;

animation-delay:4s;

}

@keyframes particleMove{

50%{

transform:translateY(-120px) scale(1.5);

}

}

/* CREATIVE SPACE FLOATING PORTAL BUTTON */

.access{

position:absolute;

left:10%;

top:75%;

z-index:10;

animation:moveBox 18s linear infinite;

}

@keyframes moveBox{

0%{

left:10%;

top:75%;

}

20%{

left:35%;

top:60%;

}

40%{

left:70%;

top:45%;

}

60%{

left:55%;

top:20%;

}

80%{

left:20%;

top:35%;

}

100%{

left:10%;

top:75%;

}

}

.access a{

display:flex;

align-items:center;

gap:15px;

padding:20px 55px;

border-radius:100px;

text-decoration:none;

color:white;

font-size:1.1rem;

font-weight:600;

letter-spacing:1px;

background:linear-gradient(

120deg,

rgba(255,255,255,.15),

rgba(255,255,255,.03),

rgba(255,255,255,.15)

);

background-size:200% 200%;

border:1px solid rgba(255,255,255,.3);

backdrop-filter:blur(25px);

animation:portalGlow 4s ease-in-out infinite;

transition:.5s;

}

@keyframes portalGlow{

0%,100%{

box-shadow:0 0 25px rgba(255,255,255,.15);

}

50%{

box-shadow:0 0 70px rgba(255,255,255,.45);

}

}

.access a:hover{

background:white;

color:black;

transform:scale(1.08);

box-shadow:0 0 100px rgba(255,255,255,.6);

}

/* ORBIT RING */

.hero::after{

content:"";

position:absolute;

width:300px;

height:300px;

border-radius:50%;

border:1px solid rgba(255,255,255,.12);

right:18%;

bottom:15%;

animation:ring 12s linear infinite;

}

@keyframes ring{

0%{

transform:rotate(0deg) scale(1);

}

50%{

transform:rotate(180deg) scale(1.2);

}

100%{

transform:rotate(360deg) scale(1);

}

}

</style>     
</head>  <body>  <section class="hero">  <div class="shape shape1"></div>  <div class="shape shape2"></div>  <div class="dot d1"></div>  <div class="dot d2"></div>  <div class="dot d3"></div>  <div class="content">  <h1>  <a href="meaning.html" class="name-link">  <span>M</span>
<span>i</span>
<span>s</span>
<span>h</span>

<br>  <span>S</span>
<span>e</span>
<span>l</span>
<span>e</span>
<span>n</span>

</a>  </h1>  <div class="subtitle">  AI-Powered Web & UI/UX Designer

</div>  </div>  <div class="access">  <a href="studio.html">  Into My Orbit →

</a>  </div>  </section>  <script>  
  
  
const button=document.querySelector(".access a");  
  
  
button.addEventListener("click",function(e){  
  
e.preventDefault();  
  
  
document.body.style.transition="1s";  
  
document.body.style.opacity="0";  
  
  
setTimeout(()=>{  
  
window.location.href="studio.html";  
  
},1000);  
  
  
});  
  
  
</script>  </body>  </html><!DOCTYPE html>  <html lang="en">  <head>  <meta charset="UTF-8">    <meta name="viewport" content="width=device-width, initial-scale=1.0">  <title>Mish Selen | AI-Powered Web & UI/UX Designer</title>  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">  <style>  *{
